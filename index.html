<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omad G'ildiragi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold2: #e0a800;
    --dark: #0d0d0d;
    --dark2: #1a1a2e;
    --dark3: #16213e;
    --accent: #ff6b35;
    --accent2: #e84393;
    --light: #f0ece3;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(245,200,66,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark2);
    font-family: 'DM Sans', sans-serif;
    color: var(--light);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(245,200,66,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(232,67,147,0.08) 0%, transparent 50%);
  }

  /* Stars background */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 75%, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events:none;
    z-index:0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }

  header p {
    margin-top: 8px;
    opacity: 0.5;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 36px;
    align-items: start;
  }

  /* ===== WHEEL SECTION ===== */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .wheel-wrapper {
    position: relative;
    width: 380px;
    height: 380px;
  }

  .wheel-wrapper canvas {
    border-radius: 50%;
    filter: drop-shadow(0 0 40px rgba(245,200,66,0.3)) drop-shadow(0 0 80px rgba(245,200,66,0.1));
    transition: filter 0.3s;
  }

  .wheel-wrapper canvas.spinning {
    filter: drop-shadow(0 0 60px rgba(245,200,66,0.6)) drop-shadow(0 0 100px rgba(232,67,147,0.3));
  }

  /* pointer */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 36px solid var(--gold);
    filter: drop-shadow(0 4px 12px rgba(245,200,66,0.8));
    z-index: 10;
    animation: pointerPulse 2s ease-in-out infinite;
  }

  @keyframes pointerPulse {
    0%, 100% { filter: drop-shadow(0 4px 12px rgba(245,200,66,0.8)); }
    50% { filter: drop-shadow(0 4px 20px rgba(245,200,66,1)) drop-shadow(0 0 30px rgba(245,200,66,0.5)); }
  }

  .spin-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
    border: none;
    padding: 16px 56px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 60px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(245,200,66,0.4), 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .spin-btn::before {
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 16px 40px rgba(245,200,66,0.6), 0 4px 16px rgba(0,0,0,0.3);
  }

  .spin-btn:hover::before { opacity: 1; }

  .spin-btn:active:not(:disabled) {
    transform: scale(0.97);
  }

  .spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Result popup */
  .result-popup {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .result-popup.show {
    opacity: 1;
    pointer-events: all;
  }

  .result-card {
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 50px 60px;
    text-align: center;
    transform: scale(0.7) translateY(40px);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(245,200,66,0.15);
    max-width: 400px;
    width: 90%;
  }

  .result-popup.show .result-card {
    transform: scale(1) translateY(0);
  }

  .result-emoji {
    font-size: 3.5rem;
    margin-bottom: 12px;
    animation: bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  .result-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-bottom: 10px;
  }

  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 28px;
    word-break: break-word;
  }

  .result-close {
    background: var(--glass);
    border: 1px solid var(--border);
    color: var(--light);
    padding: 12px 36px;
    border-radius: 40px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: all 0.3s;
  }

  .result-close:hover {
    background: rgba(245,200,66,0.15);
    border-color: var(--gold);
  }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* ===== PANEL ===== */
  .panel {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    backdrop-filter: blur(10px);
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title span { font-size: 1.3rem; }

  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .input-group input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .input-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.1);
  }

  .input-group input::placeholder { opacity: 0.35; }

  .add-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--dark);
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    font-size: 1.3rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 50px;
  }

  .add-btn:hover { transform: scale(1.1) rotate(90deg); }

  .items-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .items-list::-webkit-scrollbar { width: 4px; }
  .items-list::-webkit-scrollbar-track { background: transparent; }
  .items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 11px 14px;
    transition: all 0.3s;
    animation: itemIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes itemIn {
    from { opacity: 0; transform: translateX(20px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  .item-row:hover {
    background: rgba(245,200,66,0.06);
    border-color: rgba(245,200,66,0.2);
  }

  .item-color {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }

  .item-name {
    flex: 1;
    font-size: 0.95rem;
    opacity: 0.9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .del-btn {
    background: rgba(255,60,60,0.15);
    border: 1px solid rgba(255,60,60,0.3);
    color: #ff6b6b;
    border-radius: 8px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .del-btn:hover {
    background: rgba(255,60,60,0.35);
    transform: scale(1.15);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    opacity: 0.35;
    font-size: 0.9rem;
  }

  .empty-state div { font-size: 2.5rem; margin-bottom: 10px; }

  .count-badge {
    background: rgba(245,200,66,0.15);
    border: 1px solid rgba(245,200,66,0.3);
    color: var(--gold);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-left: auto;
  }

  .clear-all-btn {
    width: 100%;
    margin-top: 16px;
    background: rgba(255,60,60,0.1);
    border: 1px solid rgba(255,60,60,0.25);
    color: #ff8080;
    padding: 11px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }

  .clear-all-btn:hover {
    background: rgba(255,60,60,0.2);
    border-color: rgba(255,60,60,0.5);
  }

  @media (max-width: 780px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .wheel-wrapper {
      width: 320px;
      height: 320px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>✨ Omad G'ildiragi</h1>
    <p>Qur'a tashlang — taqdirni g'ildirak hal qilsin</p>
  </header>

  <div class="layout">
    <div class="wheel-section">
      <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="380" height="380"></canvas>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎰 Aylandir!</button>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>🎯</span> Variantlar
        <div class="count-badge" id="countBadge">0 ta</div>
      </div>

      <div class="input-group">
        <input type="text" id="itemInput" placeholder="Variant kiriting..." maxlength="30" onkeydown="if(event.key==='Enter') addItem()">
        <button class="add-btn" onclick="addItem()" title="Qo'shish">+</button>
      </div>

      <div class="items-list" id="itemsList"></div>

      <button class="clear-all-btn" onclick="clearAll()">🗑️ Hammasini o'chirish</button>
    </div>
  </div>
</div>

<!-- Result Popup -->
<div class="result-popup" id="resultPopup">
  <div class="result-card">
    <div class="result-emoji">🎉</div>
    <div class="result-label">Tanlangan variant</div>
    <div class="result-name" id="resultName">—</div>
    <button class="result-close" onclick="closeResult()">Yaxshi!</button>
  </div>
</div>

<script>
  // ===== COLOR PALETTE =====
  const COLORS = [
    '#f5c842','#ff6b35','#e84393','#00d4aa','#6c63ff',
    '#ff4757','#2ed573','#1e90ff','#ff7f50','#a29bfe',
    '#fd79a8','#55efc4','#fdcb6e','#74b9ff','#e17055',
    '#00cec9','#fab1a0','#636e72','#b2bec3','#dfe6e9'
  ];

  let items = JSON.parse(localStorage.getItem('wheelItems') || '[]');
  let isSpinning = false;
  let currentAngle = 0;

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const CX = W / 2;
  const CY = H / 2;
  const R = W / 2 - 10;

  function save() {
    localStorage.setItem('wheelItems', JSON.stringify(items));
  }

  function addItem() {
    const input = document.getElementById('itemInput');
    const val = input.value.trim();
    if (!val) return;
    items.push({ name: val, color: COLORS[items.length % COLORS.length] });
    input.value = '';
    save();
    renderList();
    drawWheel();
    input.focus();
  }

  function deleteItem(i) {
    items.splice(i, 1);
    save();
    renderList();
    drawWheel();
  }

  function clearAll() {
    if (items.length === 0) return;
    if (!confirm('Barcha variantlarni o\'chirishni xohlaysizmi?')) return;
    items = [];
    save();
    renderList();
    drawWheel();
  }

  function renderList() {
    const list = document.getElementById('itemsList');
    document.getElementById('countBadge').textContent = items.length + ' ta';

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-state"><div>🎡</div>Variantlar yo'q.<br>Biror narsa qo'shing!</div>`;
      return;
    }

    list.innerHTML = items.map((item, i) => `
      <div class="item-row">
        <div class="item-color" style="background:${item.color}; color:${item.color}"></div>
        <div class="item-name">${escapeHTML(item.name)}</div>
        <button class="del-btn" onclick="deleteItem(${i})" title="O'chirish">×</button>
      </div>
    `).join('');
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function drawWheel(highlightIndex = -1) {
    ctx.clearRect(0, 0, W, H);

    if (items.length === 0) {
      // Empty wheel
      ctx.save();
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(245,200,66,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.font = '800 1.1rem DM Sans, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText("Variant qo'shing", CX, CY);
      ctx.restore();
      return;
    }

    const slice = (Math.PI * 2) / items.length;

    items.forEach((item, i) => {
      const startAngle = currentAngle + i * slice;
      const endAngle = startAngle + slice;
      const mid = startAngle + slice / 2;

      // Segment
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.arc(CX, CY, R, startAngle, endAngle);
      ctx.closePath();

      if (highlightIndex === i) {
        ctx.fillStyle = '#ffffff';
      } else {
        ctx.fillStyle = item.color;
      }
      ctx.fill();

      // Segment border
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();

      // Text
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate(mid);
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';

      const maxLen = items.length === 1 ? R - 20 : R - 24;
      const fontSize = Math.max(10, Math.min(16, 260 / items.length));
      ctx.font = `600 ${fontSize}px DM Sans, sans-serif`;
      ctx.fillStyle = highlightIndex === i ? '#000' : getTextColor(item.color);

      let text = item.name;
      while (ctx.measureText(text).width > maxLen - 10 && text.length > 1) {
        text = text.slice(0, -1);
      }
      if (text !== item.name) text += '…';

      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillText(text, R - 16, 0);
      ctx.restore();
    });

    // Center circle
    ctx.save();
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 30);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.5, '#f5c842');
    grad.addColorStop(1, '#e0a800');
    ctx.beginPath();
    ctx.arc(CX, CY, 28, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(245,200,66,0.8)';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Star icon center
    ctx.save();
    ctx.font = '900 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#0d0d0d';
    ctx.fillText('★', CX, CY + 1);
    ctx.restore();
  }

  function getTextColor(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
    return lum > 0.55 ? '#1a1a2e' : '#ffffff';
  }

  function getWinnerFromAngle() {
    // Pointer is at top = -PI/2
    // Find which segment is under the pointer after spinning
    const slice = (Math.PI * 2) / items.length;
    // Normalize currentAngle so pointer angle (-PI/2) maps to segment index
    // Segment i occupies [i*slice, (i+1)*slice] relative to currentAngle offset
    // Pointer at -PI/2: relative position = (-PI/2 - currentAngle) mod 2PI
    let pointerRelative = ((-Math.PI / 2) - currentAngle) % (Math.PI * 2);
    if (pointerRelative < 0) pointerRelative += Math.PI * 2;
    const index = Math.floor(pointerRelative / slice) % items.length;
    return index;
  }

  function spinWheel() {
    if (isSpinning || items.length === 0) return;
    isSpinning = true;

    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.textContent = '🌀 Aylanmoqda...';
    canvas.classList.add('spinning');

    // Random total rotation: at least 6 full spins + random extra
    const extraSpins = 6 + Math.random() * 6;
    const randomExtra = Math.random() * Math.PI * 2;
    const totalRotation = extraSpins * Math.PI * 2 + randomExtra;

    const duration = 4500 + Math.random() * 1500;
    const startAngle = currentAngle;
    const startTime = performance.now();

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOut(t);
      currentAngle = startAngle + totalRotation * eased;
      drawWheel();

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        currentAngle = startAngle + totalRotation;
        isSpinning = false;
        btn.disabled = false;
        btn.textContent = '🎰 Aylandir!';
        canvas.classList.remove('spinning');

        // Determine winner from actual final angle
        const winIndex = getWinnerFromAngle();
        drawWheel(winIndex);
        setTimeout(() => showResult(items[winIndex].name), 400);
      }
    }

    requestAnimationFrame(animate);
  }

  function showResult(name) {
    document.getElementById('resultName').textContent = name;
    document.getElementById('resultPopup').classList.add('show');
    launchConfetti();
  }

  function closeResult() {
    document.getElementById('resultPopup').classList.remove('show');
  }

  function launchConfetti() {
    const colors = ['#f5c842','#ff6b35','#e84393','#00d4aa','#6c63ff','#ff4757','#2ed573'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.8}s;
        transform: rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  // Close popup on backdrop click
  document.getElementById('resultPopup').addEventListener('click', function(e) {
    if (e.target === this) closeResult();
  });

  // Default items
  if (items.length === 0) {
    items = [
      { name: 'Ali', color: COLORS[0] },
      { name: 'Vali', color: COLORS[1] },
      { name: 'Jasur', color: COLORS[2] },
      { name: 'Malika', color: COLORS[3] },
      { name: 'Zafar', color: COLORS[4] },
    ];
    save();
  }

  renderList();
  drawWheel();
</script>
</body>
</html>
